# render.yaml
services:
  - type: web
    name: tolu-portfolio
    runtime: python
    region: oregon          # or frankfurt if you prefer closer to Nigeria
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: tolu
    region: oregon          # must match your web service region